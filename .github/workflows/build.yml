name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
  release:
    types:
      - created

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  build:
    name: Build binaries
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: campuslink-linux-amd64
            binary: campuslink
          - goos: windows
            goarch: amd64
            artifact: campuslink-windows-amd64
            binary: campuslink.exe
          - goos: darwin
            goarch: arm64
            artifact: campuslink-darwin-arm64
            binary: campuslink

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          go build -trimpath -ldflags="-s -w" -o dist/${{ matrix.artifact }}/${{ matrix.binary }} ./cmd/campuslink

      - name: Package
        working-directory: dist
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "${{ matrix.artifact }}.zip" "${{ matrix.artifact }}"
            sha256sum "${{ matrix.artifact }}.zip" > "${{ matrix.artifact }}.zip.sha256"
          else
            tar -czf "${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}"
            sha256sum "${{ matrix.artifact }}.tar.gz" > "${{ matrix.artifact }}.tar.gz.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.tar.gz.sha256
            dist/${{ matrix.artifact }}.zip
            dist/${{ matrix.artifact }}.zip.sha256
          if-no-files-found: ignore

  release-assets:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* --generate-notes --title "$TAG_NAME"
          fi
