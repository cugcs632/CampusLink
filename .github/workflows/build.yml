name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  build:
    name: Build binaries
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: campuslink-linux-amd64
            binary: campuslink
          - goos: windows
            goarch: amd64
            artifact: campuslink-windows-amd64
            binary: campuslink.exe
          - goos: darwin
            goarch: arm64
            artifact: campuslink-darwin-arm64
            binary: campuslink

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          go build -trimpath -ldflags="-s -w" -o dist/${{ matrix.artifact }}/${{ matrix.binary }} ./cmd/campuslink

      - name: Package
        working-directory: dist
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "${{ matrix.artifact }}.zip" "${{ matrix.artifact }}"
          else
            tar -czf "${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.zip
          if-no-files-found: ignore
