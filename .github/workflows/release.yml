name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish, for example v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  build:
    name: Build release binaries
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: campuslink-linux-amd64
            binary: campuslink
            package: campuslink-linux-amd64.tar.gz
          - goos: windows
            goarch: amd64
            artifact: campuslink-windows-amd64
            binary: campuslink.exe
            package: campuslink-windows-amd64.zip
          - goos: darwin
            goarch: arm64
            artifact: campuslink-darwin-arm64
            binary: campuslink
            package: campuslink-darwin-arm64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          go build -trimpath -ldflags="-s -w" -o dist/${{ matrix.artifact }}/${{ matrix.binary }} ./cmd/campuslink

      - name: Package
        working-directory: dist
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "${{ matrix.package }}" "${{ matrix.artifact }}"
          else
            tar -czf "${{ matrix.package }}" "${{ matrix.artifact }}"
          fi
          sha256sum "${{ matrix.package }}" > "${{ matrix.package }}.sha256"

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.package }}
            dist/${{ matrix.package }}.sha256

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* --generate-notes --title "$TAG_NAME"
          fi
